<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>RKRR VIP NTM 분석</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  >

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
  ></script>

  <style>
    :root {
      --bg: #f3f5f8;
      --panel: #ffffff;
      --line: #dfe4ea;
      --text: #17202a;
      --muted: #667085;

      --red: #d92d20;
      --red-soft: #fee4e2;

      --orange: #f79009;
      --orange-soft: #fef0c7;

      --blue: #1570ef;
      --blue-soft: #dbeafe;
      --blue-panel: #f5f9ff;

      --green: #039855;
      --green-soft: #d1fadf;

      --yellow: #facc15;
      --cyan: #06b6d4;

      --shadow:
        0 4px 18px rgba(16, 24, 40, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;

      font-family:
        Arial,
        "Noto Sans KR",
        sans-serif;

      background: var(--bg);
      color: var(--text);
    }

    body {
      overflow: hidden;
    }

    button,
    select {
      font: inherit;
    }

    .app {
      display: grid;
      grid-template-rows: auto auto 1fr;

      width: 100%;
      height: 100vh;
    }

    /********************************************************
     * 헤더
     ********************************************************/

    .header {
      position: relative;
      z-index: 1000;

      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;

      padding: 11px 16px;

      background: #101828;
      color: #ffffff;

      box-shadow: var(--shadow);
    }

    .header-title {
      min-width: 0;
    }

    .header-title h1 {
      margin: 0;

      font-size: 19px;
      line-height: 1.3;
    }

    .header-title p {
      margin: 4px 0 0;

      color: #d0d5dd;
      font-size: 11px;
      line-height: 1.45;
    }

    .header-actions {
      display: flex;
      align-items: center;
      flex-shrink: 0;
      gap: 8px;
    }

    .refresh-button {
      padding: 9px 13px;

      border: 1px solid #475467;
      border-radius: 8px;

      background: #344054;
      color: #ffffff;

      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }

    .refresh-button:hover {
      background: #475467;
    }

    .refresh-button:disabled {
      opacity: 0.6;
      cursor: wait;
    }

    /********************************************************
     * Route 툴바
     ********************************************************/

    .route-toolbar {
      position: relative;
      z-index: 950;

      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;

      padding: 8px 14px;

      background: #ffffff;
      border-bottom: 1px solid var(--line);

      box-shadow:
        0 2px 8px rgba(16, 24, 40, 0.05);
    }

    .route-toolbar-title {
      margin-right: 4px;

      color: #344054;
      font-size: 12px;
      font-weight: 800;
    }

    .route-button {
      display: inline-flex;
      align-items: center;
      gap: 7px;

      padding: 8px 12px;

      border: 1px solid #d0d5dd;
      border-radius: 8px;

      background: #ffffff;
      color: #344054;

      font-size: 12px;
      font-weight: 800;
      cursor: pointer;

      transition:
        background 0.12s ease,
        border-color 0.12s ease,
        transform 0.12s ease;
    }

    .route-button:hover {
      transform: translateY(-1px);
      background: #f9fafb;
    }

    .route-button:disabled {
      opacity: 0.55;
      cursor: wait;
    }

    .route-button.active-hl8080 {
      border-color: #ca8a04;
      background: #fef9c3;
      color: #854d0e;
    }

    .route-button.active-hl8372 {
      border-color: #0891b2;
      background: #cffafe;
      color: #155e75;
    }

    .route-button.clear-route {
      color: #475467;
      background: #f9fafb;
    }

    .route-color {
      width: 11px;
      height: 11px;

      border: 2px solid rgba(0, 0, 0, 0.3);
      border-radius: 50%;
    }

    .route-color.hl8080 {
      background: var(--yellow);
    }

    .route-color.hl8372 {
      background: var(--cyan);
    }

    .route-status {
      margin-left: auto;

      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
    }

    /********************************************************
     * 레이아웃
     ********************************************************/

    .layout {
      min-height: 0;

      display: grid;
      grid-template-columns: 460px 1fr;
    }

    .sidebar {
      min-height: 0;

      display: flex;
      flex-direction: column;

      overflow: hidden;

      background: var(--bg);
      border-right: 1px solid var(--line);
    }

    /********************************************************
     * 통계
     ********************************************************/

    .summary-section {
      padding: 11px;

      background: var(--panel);
      border-bottom: 1px solid var(--line);
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 7px;
    }

    .summary-card {
      min-width: 0;
      padding: 9px;

      border: 1px solid var(--line);
      border-radius: 9px;

      background: #ffffff;
    }

    .summary-card .label {
      color: var(--muted);
      font-size: 10px;
      line-height: 1.25;
    }

    .summary-card .value {
      margin-top: 5px;

      font-size: 20px;
      font-weight: 800;
      line-height: 1;
    }

    .summary-card.danger .value {
      color: var(--red);
    }

    .summary-card.warning .value {
      color: var(--orange);
    }

    .summary-card.primary .value,
    .summary-card.other .value {
      color: var(--blue);
    }

    /********************************************************
     * 필터
     ********************************************************/

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 7px;

      padding: 9px 11px;

      background: var(--panel);
      border-bottom: 1px solid var(--line);
    }

    .control-group {
      min-width: 0;
    }

    .control-group label {
      display: block;

      margin-bottom: 4px;

      color: var(--muted);
      font-size: 10px;
      font-weight: 700;
    }

    .control-group select {
      width: 100%;
      padding: 7px;

      border: 1px solid #d0d5dd;
      border-radius: 7px;

      background: #ffffff;
      color: var(--text);

      font-size: 11px;
    }

    /********************************************************
     * NOTAM 목록
     ********************************************************/

    .notam-list {
      flex: 1;
      min-height: 0;

      padding: 9px;

      overflow-y: auto;
    }

    .notam-card {
      margin-bottom: 9px;
      padding: 11px;

      border: 1px solid var(--line);
      border-left: 5px solid var(--red);
      border-radius: 9px;

      background: var(--panel);

      box-shadow:
        0 2px 8px rgba(16, 24, 40, 0.05);

      cursor: pointer;
    }

    .notam-card:hover {
      box-shadow: var(--shadow);
    }

    .notam-card.active {
      outline: 2px solid var(--blue);
      outline-offset: 1px;
    }

    .notam-card.other-notam {
      border-left-color: var(--blue);
      background: var(--blue-panel);
    }

    .notam-card.other-notam .notam-number {
      color: var(--blue);
    }

    .notam-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
    }

    .notam-number {
      color: var(--red);
      font-size: 15px;
      font-weight: 800;
    }

    .badge {
      display: inline-flex;
      align-items: center;

      padding: 4px 7px;

      border-radius: 999px;

      font-size: 9px;
      font-weight: 800;
      white-space: nowrap;
    }

    .badge-red {
      color: #b42318;
      background: var(--red-soft);
    }

    .badge-orange {
      color: #b54708;
      background: var(--orange-soft);
    }

    .badge-blue,
    .badge-other {
      color: #175cd3;
      background: var(--blue-soft);
    }

    .badge-green {
      color: #027a48;
      background: var(--green-soft);
    }

    .notam-title {
      margin-top: 7px;

      font-size: 12px;
      font-weight: 700;
      line-height: 1.45;

      white-space: pre-line;
    }

    .notam-meta {
      display: grid;
      gap: 4px;

      margin-top: 7px;

      color: var(--muted);
      font-size: 10px;
      line-height: 1.5;
    }

    .classification-impact {
      color: var(--red);
      font-weight: 800;
    }

    .classification-other {
      color: var(--blue);
      font-weight: 800;
    }

    .schedule-toggle-row {
      display: flex;
      justify-content: flex-end;

      margin-top: 9px;
      padding-top: 8px;

      border-top: 1px solid #eaecf0;
    }

    .schedule-toggle-button {
      display: inline-flex;
      align-items: center;
      gap: 5px;

      padding: 6px 10px;

      border: 1px solid #f79009;
      border-radius: 7px;

      background: var(--orange-soft);
      color: #b54708;

      font-size: 10px;
      font-weight: 800;
      cursor: pointer;
    }

    .other-notam .schedule-toggle-button {
      border-color: #84adff;
      background: var(--blue-soft);
      color: #175cd3;
    }

    .schedule-toggle-button:hover {
      filter: brightness(0.98);
    }

    .schedule-toggle-button .toggle-arrow {
      font-size: 9px;
      transition: transform 0.15s ease;
    }

    .schedule-toggle-button.expanded .toggle-arrow {
      transform: rotate(180deg);
    }

    .schedule-list {
      display: none;
      gap: 6px;

      margin-top: 7px;
    }

    .schedule-list.visible {
      display: grid;
    }

    .schedule-item {
      padding: 7px;

      border: 1px solid #eaecf0;
      border-radius: 7px;

      background: #f9fafb;
    }

    .schedule-route {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 5px;

      font-size: 11px;
      font-weight: 800;
    }

    .schedule-time {
      margin-top: 4px;

      color: var(--muted);
      font-size: 9px;
      line-height: 1.55;
    }

    .matched-window {
      margin-top: 5px;
      padding: 5px 6px;

      border-radius: 6px;

      background: var(--orange-soft);
      color: #93370d;

      font-size: 9px;
      font-weight: 700;
      line-height: 1.45;
    }

    .other-notam .matched-window {
      background: var(--blue-soft);
      color: #175cd3;
    }

    /********************************************************
     * 지도
     ********************************************************/

    .map-wrap {
      position: relative;

      min-width: 0;
      min-height: 0;
    }

    #map {
      width: 100%;
      height: 100%;

      background: #dbe4eb;
    }

    .map-legend {
      position: absolute;
      right: 12px;
      bottom: 24px;
      z-index: 800;

      padding: 9px 11px;

      border: 1px solid var(--line);
      border-radius: 9px;

      background: rgba(255, 255, 255, 0.96);
      box-shadow: var(--shadow);

      font-size: 10px;
      line-height: 1.7;
    }

    .legend-row {
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .legend-symbol {
      width: 12px;
      height: 12px;

      flex-shrink: 0;
    }

    .legend-circle {
      border-radius: 50%;
    }

    .legend-red {
      border: 2px solid var(--red);
      background: rgba(217, 45, 32, 0.45);
    }

    .legend-orange {
      border: 2px solid var(--orange);
      background: rgba(247, 144, 9, 0.26);
    }

    .legend-blue {
      border: 2px solid var(--blue);
      background: rgba(21, 112, 239, 0.22);
    }

    .legend-line-yellow {
      height: 4px;
      background: var(--yellow);
      border: 1px solid #854d0e;
    }

    .legend-line-cyan {
      height: 4px;
      background: var(--cyan);
      border: 1px solid #155e75;
    }

    /********************************************************
     * 로딩
     ********************************************************/

    .loading-overlay {
      position: fixed;
      inset: 0;
      z-index: 5000;

      display: none;
      align-items: center;
      justify-content: center;

      background: rgba(16, 24, 40, 0.45);
    }

    .loading-overlay.visible {
      display: flex;
    }

    .loading-box {
      min-width: 220px;
      padding: 20px 26px;

      border-radius: 12px;

      background: #ffffff;
      box-shadow: var(--shadow);

      text-align: center;
    }

    .spinner {
      width: 34px;
      height: 34px;

      margin: 0 auto 12px;

      border: 4px solid #eaecf0;
      border-top-color: var(--blue);
      border-radius: 50%;

      animation: spin 0.85s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .status-message {
      padding: 28px 15px;

      color: var(--muted);
      text-align: center;
      line-height: 1.7;
    }

    .error-message {
      color: var(--red);
    }

    /********************************************************
     * Popup
     ********************************************************/

    .leaflet-popup-content {
      min-width: 250px;
      margin: 12px;
    }

    .popup-title {
      margin-bottom: 7px;

      font-size: 14px;
      font-weight: 800;
    }

    .popup-row {
      margin: 4px 0;

      font-size: 10px;
      line-height: 1.5;
    }

    .popup-text {
      max-height: 180px;
      margin-top: 8px;
      padding-top: 7px;

      overflow-y: auto;

      border-top: 1px solid #eaecf0;

      font-size: 9px;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    .route-popup-title {
      margin-bottom: 5px;

      font-size: 13px;
      font-weight: 800;
    }

    /********************************************************
     * 모바일
     ********************************************************/

    @media (max-width: 1000px) {
      .layout {
        grid-template-columns: 420px 1fr;
      }

      .summary-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .controls {
        grid-template-columns: 1fr 1fr;
      }

      .control-group:last-child {
        grid-column: 1 / -1;
      }
    }

    @media (max-width: 800px) {
      body {
        overflow: auto;
      }

      .app {
        height: auto;
        min-height: 100vh;
      }

      .layout {
        grid-template-columns: 1fr;
        grid-template-rows: auto 65vh;
      }

      .sidebar {
        max-height: none;
        overflow: visible;
      }

      .notam-list {
        max-height: 58vh;
      }

      .map-wrap {
        min-height: 65vh;
      }

      .header {
        align-items: flex-start;
      }

      .route-status {
        width: 100%;
        margin-left: 0;
      }
    }

    @media (max-width: 520px) {
      .header {
        flex-direction: column;
      }

      .header-actions,
      .refresh-button {
        width: 100%;
      }

      .summary-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .controls {
        grid-template-columns: 1fr;
      }

      .control-group:last-child {
        grid-column: auto;
      }

      .route-button {
        flex: 1;
        justify-content: center;
      }
    }
  </style>
</head>

<body>
  <div class="app">

    <header class="header">

      <div class="header-title">
        <h1>RKRR VIP NTM 분석</h1>

        <p>
          모든 RKRR VIP NTM 표출 · 5일 미만 스케줄 중첩 시 영향 NTM
        </p>
      </div>

      <div class="header-actions">
        <button
          id="refreshButton"
          class="refresh-button"
          type="button"
        >
          NOTAM 새로고침
        </button>
      </div>

    </header>

    <section class="route-toolbar">

      <span class="route-toolbar-title">
        항공기 Route
      </span>

      <button
        id="hl8080RouteButton"
        class="route-button"
        type="button"
      >
        <span class="route-color hl8080"></span>
        HL8080 Route
      </button>

      <button
        id="hl8372RouteButton"
        class="route-button"
        type="button"
      >
        <span class="route-color hl8372"></span>
        HL8372 Route
      </button>

      <button
        id="clearRouteButton"
        class="route-button clear-route"
        type="button"
      >
        전체 루트 삭제
      </button>

      <span
        id="routeStatus"
        class="route-status"
      >
        루트가 선택되지 않았습니다.
      </span>

    </section>

    <main class="layout">

      <aside class="sidebar">

        <section class="summary-section">

          <div class="summary-grid">

            <div class="summary-card danger">
              <div class="label">영향 NTM</div>

              <div
                id="affectedNotamsValue"
                class="value"
              >
                -
              </div>
            </div>

            <div class="summary-card other">
              <div class="label">기타 NTM</div>

              <div
                id="otherNotamsValue"
                class="value"
              >
                -
              </div>
            </div>

          </div>

        </section>

        <section class="controls">

          <div class="control-group">
            <label for="aircraftFilter">
              항공기
            </label>

            <select id="aircraftFilter">
              <option value="ALL">전체</option>
              <option value="ACJ">ACJ</option>
              <option value="G650">G650</option>
            </select>
          </div>

          <div class="control-group">
            <label for="directionFilter">
              운항 구분
            </label>

            <select id="directionFilter">
              <option value="ALL">전체</option>
              <option value="KOREA_DEPARTURE">국제선(출발)</option>
              <option value="KOREA_ARRIVAL">국제선(도착)</option>
              <option value="DOMESTIC">국내선</option>
            </select>
          </div>

          <div class="control-group">
            <label for="classificationFilter">
              NOTAM 분류
            </label>

            <select id="classificationFilter">
              <option value="ALL">전체</option>
              <option value="IMPACT">영향 NTM</option>
              <option value="OTHER">기타 NTM</option>
            </select>
          </div>

        </section>

        <section
          id="notamList"
          class="notam-list"
        >
          <div class="status-message">
            데이터를 불러오는 중입니다.
          </div>
        </section>

      </aside>

      <section class="map-wrap">

        <div id="map"></div>

        <div class="map-legend">

          <div class="legend-row">
            <span
              class="legend-symbol legend-circle legend-red"
            ></span>

            <span>중심원</span>
          </div>

          <div class="legend-row">
            <span
              class="legend-symbol legend-circle legend-orange"
            ></span>

            <span>버퍼존</span>
          </div>

          <div class="legend-row">
            <span
              class="legend-symbol legend-circle legend-blue"
            ></span>

            <span>기타 NTM</span>
          </div>

          <div class="legend-row">
            <span
              class="legend-symbol legend-line-yellow"
            ></span>

            <span>HL8080 Route</span>
          </div>

          <div class="legend-row">
            <span
              class="legend-symbol legend-line-cyan"
            ></span>

            <span>HL8372 Route</span>
          </div>

        </div>

      </section>

    </main>
  </div>

  <div
    id="loadingOverlay"
    class="loading-overlay"
  >
    <div class="loading-box">

      <div class="spinner"></div>

      <strong id="loadingTitle">
        NOTAM 분석 중
      </strong>

      <div
        id="loadingDescription"
        style="
          margin-top: 6px;
          color: #667085;
          font-size: 12px;
        "
      >
        KOCA NOTAM과 운항 스케줄을 확인합니다.
      </div>

    </div>
  </div>


  <script>
    "use strict";


    /********************************************************
     * 설정
     ********************************************************/

    /*
     * 네 Apps Script Web App URL로 반드시 교체
     */
    const BACKEND_URL =
      "https://script.google.com/macros/s/AKfycbwkURZ2sVhsQoy3-51ON8z75ZyaL4J9Lu8WCDgDnyQdOp72sD016KeQqG1U_MbV3AP_/exec";

    /*
     * GitHub Pages Flight Map 루트 경로
     */
    const ROUTE_BASE_URL =
      "https://bomi87.github.io/FLIGHT_MAP/live/";

    const ROUTE_CONFIG = {
      HL8080: {
        aircraft:
          "HL8080",

        file:
          "HL8080.kml",

        color:
          "#facc15",

        outlineColor:
          "#854d0e",

        buttonId:
          "hl8080RouteButton",

        activeClass:
          "active-hl8080"
      },

      HL8372: {
        aircraft:
          "HL8372",

        file:
          "HL8372.kml",

        color:
          "#06b6d4",

        outlineColor:
          "#155e75",

        buttonId:
          "hl8372RouteButton",

        activeClass:
          "active-hl8372"
      }
    };

    /*
     * 백엔드 category 값이 없을 때만 사용하는 fallback 기준.
     * 정확히 5일 이상이면 기타 NTM으로 분류.
     */
    const LONG_TERM_THRESHOLD_MS =
      5 *
      24 *
      60 *
      60 *
      1000;


    /********************************************************
     * 상태
     ********************************************************/

    const state = {
      rawData:
        null,

      filteredNotams:
        [],

      notamMapLayers:
        new Map(),

      selectedNotamNo:
        null,

      routeLayers:
        new Map(),

      /* 현재 Route가 사용하는 360도 세계의 기준 경도 */

    /********************************************************
     * NOTAM 데이터 조회
     ********************************************************/

    async function loadImpactData(
      forceRefresh
    ) {
      showLoading(
        "NOTAM 분석 중",
        "KOCA NOTAM과 운항 스케줄을 확인합니다."
      );

      try {
        const url =
          BACKEND_URL +
          "?mode=prohibitedImpact" +
          (
            forceRefresh
              ? "&force=true"
              : ""
          ) +
          "&_=" +
          Date.now();

        const response =
          await fetch(
            url,
            {
              method:
                "GET",

              cache:
                "no-store",

              redirect:
                "follow"
            }
          );

        if (!response.ok) {
          throw new Error(
            "백엔드 응답 오류: HTTP " +
            response.status
          );
        }

        const data =
          await response.json();

        if (
          !data ||
          data.ok !== true
        ) {
          throw new Error(
            data &&
            data.message
              ? data.message
              : "분석 데이터를 가져오지 못했습니다."
          );
        }

        state.rawData =
          data;

        state.selectedNotamNo =
          null;

        applyFilters();

      } catch (error) {
        console.error(
          error
        );

        notamListElement.innerHTML =
          '<div class="status-message error-message">' +
            "<strong>데이터 조회 실패</strong><br>" +
            escapeHtml(
              error.message ||
              String(error)
            ) +
          "</div>";

        clearNotamMapLayers();
        resetSummary();

      } finally {
        hideLoading();
      }
    }


    /********************************************************
     * 필터
     ********************************************************/

    function applyFilters() {
      if (
        !state.rawData ||
        !Array.isArray(
          state.rawData.notams
        )
      ) {
        return;
      }

      const selectedAircraft =
        aircraftFilter.value;

      const selectedDirection =
        directionFilter.value;

      const selectedClassification =
        classificationFilter.value;

      state.filteredNotams =
        state.rawData.notams
          .map(
            function (notam) {
              const backendSchedules =
                Array.isArray(
                  notam.schedules
                )
                  ? notam.schedules
                  : [];

              const matchedSchedules =
                Array.isArray(
                  notam.matchedSchedules
                )
                  ? notam.matchedSchedules
                  : backendSchedules;

              /*
               * 영향 NTM의 운항편만 항공기/방향 필터 적용.
               * 기타 NTM은 운항편이 없어도 NOTAM 자체를 유지한다.
               */
              const filteredSchedules =
                backendSchedules.filter(
                  function (schedule) {
                    const aircraftMatches =
                      selectedAircraft ===
                        "ALL" ||
                      schedule.aircraft ===
                        selectedAircraft;

                    const directionMatches =
                      selectedDirection ===
                        "ALL" ||
                      schedule.direction ===
                        selectedDirection;

                    return (
                      aircraftMatches &&
                      directionMatches
                    );
                  }
                );

              const filteredMatchedSchedules =
                matchedSchedules.filter(
                  function (schedule) {
                    const aircraftMatches =
                      selectedAircraft ===
                        "ALL" ||
                      schedule.aircraft ===
                        selectedAircraft;

                    const directionMatches =
                      selectedDirection ===
                        "ALL" ||
                      schedule.direction ===
                        selectedDirection;

                    return (
                      aircraftMatches &&
                      directionMatches
                    );
                  }
                );

              const other =
                isOtherNotam(
                  notam
                );

              return Object.assign(
                {},
                notam,
                {
                  schedules:
                    filteredSchedules,

                  matchedSchedules:
                    filteredMatchedSchedules,

                  isOther:
                    other
                }
              );
            }
          )
          .filter(
            function (notam) {
              /*
               * 기타 NTM은 운항편이 0편이어도 항상 표시.
               *
               * 영향 NTM에 항공기/방향 필터를 적용한 결과
               * 해당 운항편이 0편이면 그 필터에서는 제외한다.
               */
              if (
                !notam.isOther &&
                (
                  selectedAircraft !== "ALL" ||
                  selectedDirection !== "ALL"
                ) &&
                notam.schedules.length === 0
              ) {
                return false;
              }

              if (
                selectedClassification ===
                "IMPACT"
              ) {
                return !notam.isOther;
              }

              if (
                selectedClassification ===
                "OTHER"
              ) {
                return notam.isOther;
              }

              return true;
            }
          )
          .sort(
            function (a, b) {
              if (
                a.isOther !==
                b.isOther
              ) {
                return (
                  a.isOther
                    ? 1
                    : -1
                );
              }

              return (
                new Date(
                  a.startUtc
                ).getTime() -
                new Date(
                  b.startUtc
                ).getTime()
              );
            }
          );

      renderNotamList(
        state.filteredNotams
      );

      renderNotamMap(
        state.filteredNotams
      );

      updateFilteredSummary(
        state.filteredNotams
      );
    }

    /********************************************************
     * NOTAM 분류
     *
     * 백엔드의 category 값을 최우선 사용.
     * category가 없는 구버전 응답만 5일 기준으로 fallback.
     ********************************************************/

    function isOtherNotam(
      notam
    ) {
      const category =
        String(
          notam &&
          notam.category
            ? notam.category
            : ""
        ).toUpperCase();

      if (
        category === "OTHER"
      ) {
        return true;
      }

      if (
        category === "IMPACT"
      ) {
        return false;
      }

      const start =
        new Date(
          notam.startUtc
        ).getTime();

      const end =
        new Date(
          notam.endUtc
        ).getTime();

      if (
        !Number.isFinite(
          start
        ) ||
        !Number.isFinite(
          end
        ) ||
        end < start
      ) {
        return false;
      }

      return (
        end - start >=
        LONG_TERM_THRESHOLD_MS
      );
    }


    /********************************************************

    function updateFilteredSummary(
      notams

      const impactNotams =
        notams.filter(

              notam

      const otherNotams =
        notams.filter(

          }
        );

      setText(
        "affectedNotamsValue",
        impactNotams.length
      );

      setText(
        "otherNotamsValue",
        otherNotams.length
      );
    }

    /********************************************************
     * NOTAM 지도
     ********************************************************/

    function renderNotamMap(
      notams
    ) {
      clearNotamMapLayers();

      const bounds =
        [];

      notams.forEach(
        function (notam) {
          const layers =
            createNotamLayers(
              notam
            );

          layers.forEach(
            function (layer) {
              layer.addTo(
                notamLayerGroup
              );
            }
          );

          state.notamMapLayers.set(
            notam.notamNo,
            layers
          );

          collectLayerBounds(
            layers,
            bounds
          );
        }
      );

      /*
       * Route가 표시 중이면 NOTAM 필터 변경 시
       * 지도를 강제로 NOTAM 위치로 이동하지 않음
       */
      if (
        state.routeLayers.size === 0
      ) {
        fitBoundsSafely(
          bounds,
          10
        );
      }
    }


    function createNotamLayers(
      notam
    ) {
      const layers =
        [];

      const other =
        isOtherNotam(
          notam
        );

      const color =
        other
          ? "#1570ef"
          : "#d92d20";

      const popupHtml =
        buildNotamPopupHtml(
          notam
        );

      const renderReferenceLng =
        Number.isFinite(
          Number(state.routeReferenceLng)
        )
          ? Number(state.routeReferenceLng)
          : null;

      const renderCenterLng =
        notam.center &&
        isFiniteNumber(notam.center.lng)
          ? shiftLonNearReference(
              Number(notam.center.lng),
              renderReferenceLng
            )
          : null;

      if (
        notam.center &&
        isFiniteNumber(
          notam.center.lat
        ) &&
        isFiniteNumber(
          notam.center.lng
        ) &&
        isFiniteNumber(
          notam.coreRadiusNm
        ) &&
        Number(
          notam.coreRadiusNm
        ) > 0
      ) {
        if (
          isFiniteNumber(
            notam.bufferRadiusNm
          ) &&
          Number(
            notam.bufferRadiusNm
          ) >
          Number(
            notam.coreRadiusNm
          )
        ) {
          const bufferColor =
            other
              ? "#1570ef"
              : "#f79009";

          const buffer =
            L.circle(
              [
                Number(
                  notam.center.lat
                ),
                renderCenterLng
              ],
              {
                radius:
                  nmToMeters(
                    notam.bufferRadiusNm
                  ),

                color:
                  bufferColor,

                weight:
                  2,

                fillColor:
                  bufferColor,

                fillOpacity:
                  other
                    ? 0.06
                    : 0.18,

                dashArray:
                  "6 5"
              }
            );

          bindNotamLayerEvents(
            buffer,
            notam,
            popupHtml
          );

          layers.push(
            buffer
          );
        }

        const core =
          L.circle(
            [
              Number(
                notam.center.lat
              ),
              renderCenterLng
            ],
            {
              radius:
                nmToMeters(
                  notam.coreRadiusNm
                ),

              color:
                color,

              weight:
                3,

              fillColor:
                color,

              fillOpacity:
                other
                  ? 0.16
                  : 0.32,

              dashArray:
                other
                  ? "7 5"
                  : null
            }
          );

        bindNotamLayerEvents(
          core,
          notam,
          popupHtml
        );

        layers.push(
          core
        );
      }

      if (
        Array.isArray(
          notam.polygon
        ) &&
        notam.polygon.length >= 3
      ) {
        const latLngs =
          notam.polygon
            .filter(
              function (point) {
                return (
                  point &&
                  isFiniteNumber(
                    point.lat
                  ) &&
                  isFiniteNumber(
                    point.lng
                  )
                );
              }
            )
            .map(
              function (point) {
                return {
                  lat: Number(point.lat),
                  lon: Number(point.lng)
                };
              }
            );

        if (
          latLngs.length >= 3
        ) {
          const polygonLatLngs =
            unwrapCoordSequence(
              latLngs,
              renderReferenceLng
            );

          const polygon =
            L.polygon(
              polygonLatLngs,
              {
                color:
                  color,

                weight:
                  3,

                fillColor:
                  color,

                fillOpacity:
                  other
                    ? 0.16
                    : 0.30,

                dashArray:
                  other
                    ? "7 5"
                    : null
              }
            );

          bindNotamLayerEvents(
            polygon,
            notam,
            popupHtml
          );

          layers.push(
            polygon
          );
        }
      }

      return layers;
    }


    function bindNotamLayerEvents(
      layer,
      notam,
      popupHtml
    ) {
      layer.bindPopup(
        popupHtml
      );

      layer.on(
        "click",
        function () {
          highlightCard(
            notam.notamNo
          );
        }
      );

    }


    /********************************************************
     * Route 버튼
     ********************************************************/

    async function toggleRoute(
      aircraft
    ) {
      if (
        state.routeLoading.has(
          aircraft
        )
      ) {
        return;
      }

      if (
        state.routeLayers.has(
          aircraft
        )
      ) {
        removeRoute(
          aircraft
        );

        return;
      }

      await loadRouteByAircraft(
        aircraft,
        true
      );
    }


    async function loadRouteByAircraft(
      aircraft,
      zoomToRoute
    ) {
      const config =
        ROUTE_CONFIG[
          aircraft
        ];

      if (!config) {
        throw new Error(
          "지원되지 않는 항공기입니다: " +
          aircraft
        );
      }

      state.routeLoading.add(
        aircraft
      );

      updateRouteButtonState();

      routeStatus.textContent =
        aircraft +
        " Route 불러오는 중...";

      try {
        const url =
          ROUTE_BASE_URL +
          config.file +
          "?v=" +
          Date.now();

        const response =
          await fetch(
            url,
            {
              method:
                "GET",

              cache:
                "no-store"
            }
          );

        if (!response.ok) {
          throw new Error(
            aircraft +
            " KML 호출 실패: HTTP " +
            response.status
          );
        }

        const kmlText =
          await response.text();

        const routeResult =
          parseAndDrawKmlRoute(
            kmlText,
            config
          );

        if (
          routeResult.layers.length === 0
        ) {
          throw new Error(
            aircraft +
            " KML에서 표시 가능한 경로를 찾지 못했습니다."
          );
        }

        routeResult.layers.forEach(
          function (layer) {
            layer.addTo(
              routeLayerGroup
            );
          }
        );

        state.routeLayers.set(
          aircraft,
          routeResult
        );

        state.routeReferenceLng =
          Number.isFinite(Number(routeResult.referenceLng))
            ? Number(routeResult.referenceLng)
            : state.routeReferenceLng;

        /* NOTAM도 Route와 같은 360도 세계에 다시 배치 */
        renderNotamMap(
          state.filteredNotams
        );

        routeStatus.textContent =
          aircraft +
          " Route 표시 완료 · " +
          routeResult.pointCount +
          "개 좌표";

        if (
          zoomToRoute &&
          routeResult.bounds &&
          routeResult.bounds.isValid()
        ) {
          map.fitBounds(
            routeResult.bounds,
            {
              padding:
                [
                  35,
                  35
                ],

              maxZoom:
                10
            }
          );
        }

      } catch (error) {
        console.error(
          error
        );

        routeStatus.textContent =
          getErrorMessage(
            error
          );

        alert(
          getErrorMessage(
            error
          )
        );

      } finally {
        state.routeLoading.delete(
          aircraft
        );

        updateRouteButtonState();
      }
    }


    function removeRoute(
      aircraft
    ) {
      const routeResult =
        state.routeLayers.get(
          aircraft
        );

      if (!routeResult) {
        return;
      }

      routeResult.layers.forEach(
        function (layer) {
          routeLayerGroup.removeLayer(
            layer
          );
        }
      );

      state.routeLayers.delete(
        aircraft
      );

      const remainingRoute =
        state.routeLayers.values().next().value;

      state.routeReferenceLng =
        remainingRoute &&
        Number.isFinite(Number(remainingRoute.referenceLng))
          ? Number(remainingRoute.referenceLng)
          : null;

      renderNotamMap(
        state.filteredNotams
      );

      updateRouteButtonState();
      updateRouteStatusText();
    }


    function clearAllRoutes() {
      routeLayerGroup.clearLayers();
      state.routeLayers.clear();
      state.routeReferenceLng = null;

      renderNotamMap(
        state.filteredNotams
      );

      updateRouteButtonState();

      routeStatus.textContent =
        "모든 항공기 Route를 삭제했습니다.";
    }


    function updateRouteButtonState() {
      Object.keys(
        ROUTE_CONFIG
      ).forEach(
        function (aircraft) {
          const config =
            ROUTE_CONFIG[
              aircraft
            ];

          const button =
            document.getElementById(
              config.buttonId
            );

          const loaded =
            state.routeLayers.has(
              aircraft
            );

          const loading =
            state.routeLoading.has(
              aircraft
            );

          button.disabled =
            loading;

          button.classList.toggle(
            config.activeClass,
            loaded
          );

          if (loading) {
            button.lastChild.textContent =
              " " +
              aircraft +
              " 로딩 중";

          } else {
            button.lastChild.textContent =
              " " +
              aircraft +
              " Route";
          }
        }
      );
    }


    function updateRouteStatusText() {
      const activeRoutes =
        Array.from(
          state.routeLayers.keys()
        );

      if (
        activeRoutes.length === 0
      ) {
        routeStatus.textContent =
          "루트가 선택되지 않았습니다.";

        return;
      }

      routeStatus.textContent =
        activeRoutes.join(
          ", "
        ) +
        " Route 표시 중";
    }


    /********************************************************
     * KML 파싱 및 표시
     ********************************************************/

    function wrapLon180(
      lon
    ) {
      let x = Number(lon);

      if (!Number.isFinite(x)) {
        return x;
      }

      while (x <= -180) {
        x += 360;
      }

      while (x > 180) {
        x -= 360;
      }

      return x;
    }


    function shiftLonNearReference(
      lon,
      referenceLon
    ) {
      let x = wrapLon180(lon);
      const reference = Number(referenceLon);

      if (!Number.isFinite(reference)) {
        return x;
      }

      while (x - reference > 180) {
        x -= 360;
      }

      while (x - reference < -180) {
        x += 360;
      }

      return x;
    }


    function unwrapLonNext(
      previousLon,
      currentLon
    ) {
      let x = wrapLon180(currentLon);

      while (x - previousLon > 180) {
        x -= 360;
      }

      while (x - previousLon < -180) {
        x += 360;
      }

      return x;
    }


    function unwrapCoordSequence(
      coords,
      referenceLon
    ) {
      if (
        !Array.isArray(coords) ||
        coords.length === 0
      ) {
        return [];
      }

      const first = coords[0];
      const firstLat = Number(
        Array.isArray(first)
          ? first[0]
          : first.lat
      );
      const firstRawLon = Number(
        Array.isArray(first)
          ? first[1]
          : first.lon
      );
      const firstLon = shiftLonNearReference(
        firstRawLon,
        referenceLon
      );

      if (
        !Number.isFinite(firstLat) ||
        !Number.isFinite(firstLon)
      ) {
        return [];
      }

      const result = [[firstLat, firstLon]];
      let previousLon = firstLon;

      for (let i = 1; i < coords.length; i++) {
        const item = coords[i];
        const lat = Number(
          Array.isArray(item)
            ? item[0]
            : item.lat
        );
        const rawLon = Number(
          Array.isArray(item)
            ? item[1]
            : item.lon
        );

        if (
          !Number.isFinite(lat) ||
          !Number.isFinite(rawLon)
        ) {
          continue;
        }

        const lon = unwrapLonNext(
          previousLon,
          rawLon
        );

        result.push([lat, lon]);
        previousLon = lon;
      }

      return result;
    }


    function averageNumbers(
      values
    ) {
      const valid = values.filter(
        Number.isFinite
      );

      if (valid.length === 0) {
        return 0;
      }

      return valid.reduce(
        function (sum, value) {
          return sum + value;
        },
        0
      ) / valid.length;
    }


    function parseAndDrawKmlRoute(
      kmlText,
      config
    ) {
      const parser = new DOMParser();
      const xml = parser.parseFromString(
        kmlText,
        "application/xml"
      );

      if (xml.querySelector("parsererror")) {
        throw new Error(
          config.aircraft +
          " KML XML 파싱 실패"
        );
      }

      const layers = [];
      const allBounds = [];
      let pointCount = 0;

      const lineStrings = Array.from(
        xml.getElementsByTagName(
          "LineString"
        )
      );

      const rawLineSegments = lineStrings
        .map(
          function (lineString) {
            const coordinatesNode =
              lineString.getElementsByTagName(
                "coordinates"
              )[0];

            if (!coordinatesNode) {
              return null;
            }

            const placemark = lineString.closest
              ? lineString.closest("Placemark")
              : null;
            const nameNode = placemark
              ? placemark.getElementsByTagName(
                  "name"
                )[0]
              : null;

            return {
              coords: parseKmlCoordinates(
                coordinatesNode.textContent
              ),
              name:
                nameNode &&
                nameNode.textContent.trim()
                  ? nameNode.textContent.trim()
                  : config.aircraft + " Route"
            };
          }
        )
        .filter(
          function (segment) {
            return (
              segment &&
              Array.isArray(segment.coords) &&
              segment.coords.length > 1
            );
          }
        );

      const gxTracks = Array.from(
        xml.getElementsByTagNameNS(
          "*",
          "Track"
        )
      );

      const rawTrackSegments = gxTracks
        .map(
          function (track) {
            const coordNodes = Array.from(
              track.getElementsByTagNameNS(
                "*",
                "coord"
              )
            );

            const coords = coordNodes
              .map(
                function (node) {
                  const parts = String(
                    node.textContent || ""
                  )
                    .trim()
                    .split(/\s+/);

                  const lon = Number(parts[0]);
                  const lat = Number(parts[1]);

                  return isUsableRouteCoordinate(
                    lat,
                    lon
                  )
                    ? [lat, lon]
                    : null;
                }
              )
              .filter(Boolean);

            const placemark = track.closest
              ? track.closest("Placemark")
              : null;
            const nameNode = placemark
              ? placemark.getElementsByTagName(
                  "name"
                )[0]
              : null;

            return {
              coords: coords,
              name:
                nameNode &&
                nameNode.textContent.trim()
                  ? nameNode.textContent.trim()
                  : config.aircraft + " Route"
            };
          }
        )
        .filter(
          function (segment) {
            return segment.coords.length > 1;
          }
        );

      const routeSegments =
        rawLineSegments.length > 0
          ? rawLineSegments
          : rawTrackSegments;

      let routeReferenceLng = 0;

      if (routeSegments.length > 0) {
        const firstCoords = routeSegments[0].coords;
        const initialReference = wrapLon180(
          firstCoords[0][1]
        );
        const firstUnwrapped = unwrapCoordSequence(
          firstCoords,
          initialReference
        );

        routeReferenceLng = averageNumbers(
          firstUnwrapped.map(
            function (point) {
              return Number(point[1]);
            }
          )
        );
      }

      function drawRouteSegment(
        segment
      ) {
        const latLngs = unwrapCoordSequence(
          segment.coords,
          routeReferenceLng
        );

        if (latLngs.length < 2) {
          return;
        }

        pointCount += latLngs.length;

        const outline = L.polyline(
          latLngs,
          {
            color: config.outlineColor,
            weight: 7,
            opacity: 0.72,
            lineJoin: "round",
            lineCap: "round",
            noClip: true
          }
        );

        const routeLine = L.polyline(
          latLngs,
          {
            color: config.color,
            weight: 4,
            opacity: 1,
            lineJoin: "round",
            lineCap: "round",
            noClip: true
          }
        );

        const popupHtml =
          '<div class="route-popup-title">' +
            escapeHtml(segment.name) +
          "</div>" +
          "<div>" +
            latLngs.length +
            "개 경로 좌표" +
          "</div>";

        outline.bindPopup(popupHtml);
        routeLine.bindPopup(popupHtml);

        layers.push(
          outline,
          routeLine
        );

        latLngs.forEach(
          function (point) {
            allBounds.push(point);
          }
        );
      }

      routeSegments.forEach(
        drawRouteSegment
      );

      const placemarks = Array.from(
        xml.getElementsByTagName(
          "Placemark"
        )
      );

      placemarks.forEach(
        function (placemark) {
          const pointNode =
            placemark.getElementsByTagName(
              "Point"
            )[0];

          if (!pointNode) {
            return;
          }

          const coordinatesNode =
            pointNode.getElementsByTagName(
              "coordinates"
            )[0];

          if (!coordinatesNode) {
            return;
          }

          const rawPoints = parseKmlCoordinates(
            coordinatesNode.textContent
          );

          if (rawPoints.length === 0) {
            return;
          }

          const lat = Number(rawPoints[0][0]);
          const lon = shiftLonNearReference(
            Number(rawPoints[0][1]),
            routeReferenceLng
          );
          const latLng = [lat, lon];

          const nameNode =
            placemark.getElementsByTagName(
              "name"
            )[0];
          const descriptionNode =
            placemark.getElementsByTagName(
              "description"
            )[0];

          const pointName =
            nameNode &&
            nameNode.textContent.trim()
              ? nameNode.textContent.trim()
              : "Waypoint";
          const description = descriptionNode
            ? descriptionNode.textContent.trim()
            : "";

          const marker = L.circleMarker(
            latLng,
            {
              radius: 5,
              color: config.outlineColor,
              weight: 2,
              fillColor: config.color,
              fillOpacity: 0.95
            }
          );

          marker.bindTooltip(
            escapeHtml(pointName),
            {
              permanent: false,
              direction: "top"
            }
          );

          marker.bindPopup(
            '<div class="route-popup-title">' +
              escapeHtml(pointName) +
            "</div>" +
            (
              description
                ? '<div style="margin-top:5px;font-size:10px;">' +
                    escapeHtml(description) +
                  "</div>"
                : ""
            )
          );

          layers.push(marker);
          allBounds.push(latLng);
        }
      );

      return {
        layers: layers,
        bounds:
          allBounds.length > 0
            ? L.latLngBounds(allBounds)
            : null,
        pointCount: pointCount,
        referenceLng: routeReferenceLng
      };
    }


    function isUsableRouteCoordinate(
      lat,
      lng
    ) {
      if (
        !Number.isFinite(lat) ||
        !Number.isFinite(lng) ||
        lat < -90 ||
        lat > 90 ||
        lng < -180 ||
        lng > 180
      ) {
        return false;
      }

      /*
       * KML 생성 과정에서 빈 좌표가 0,0(Null Island)로
       * 들어오는 경우가 있어 실제 Route와 긴 직선으로 연결됩니다.
       * 항공 Route 좌표로 볼 수 없는 0,0 근처 값은 제외합니다.
       */
      if (
        Math.abs(lat) < 0.0001 &&
        Math.abs(lng) < 0.0001
      ) {
        return false;
      }

      return true;
    }


    function parseKmlCoordinates(
      coordinateText
    ) {
      return String(
        coordinateText ||
        ""
      )
        .trim()
        .split(
          /\s+/
        )
        .map(
          function (coordinate) {
            const parts =
              coordinate
                .split(",");

            if (
              parts.length < 2
            ) {
              return null;
            }

            const lng =
              Number(
                parts[0]
              );

            const lat =
              Number(
                parts[1]
              );

            if (
              !isUsableRouteCoordinate(
                lat,
                lng
              )
            ) {
              return null;
            }

            return [
              lat,
              lng
            ];
          }
        )
        .filter(Boolean);
    }


    /********************************************************
     * URL 자동 Route 로딩
     *
     * 지원:
     * ?route=HL8080
     * ?route=HL8372
     * ?file=live/HL8080.kml
     * ?file=live/HL8372.kml
     ********************************************************/

    async function autoLoadRouteFromUrl() {
      const params =
        new URLSearchParams(
          window.location.search
        );

      let aircraft =
        String(
          params.get(
            "route"
          ) ||
          ""
        )
          .trim()
          .toUpperCase();

      if (!aircraft) {
        const file =
          String(
            params.get(
              "file"
            ) ||
            ""
          )
            .trim()
            .toUpperCase();

        if (
          file.includes(
            "HL8080.KML"
          )
        ) {
          aircraft =
            "HL8080";

        } else if (
          file.includes(
            "HL8372.KML"
          )
        ) {
          aircraft =
            "HL8372";
        }
      }

      if (
        ROUTE_CONFIG[
          aircraft
        ]
      ) {
        await loadRouteByAircraft(
          aircraft,
          true
        );
      }
    }


    /********************************************************
     * NOTAM 선택
     ********************************************************/

    function selectNotam(
      notamNo
    ) {
      state.selectedNotamNo =
        notamNo;

      highlightCard(
        notamNo
      );

      const layers =
        state.notamMapLayers.get(
          notamNo
        );

      if (
        !layers ||
        layers.length === 0
      ) {
        return;
      }

      const bounds =
        [];

      collectLayerBounds(
        layers,
        bounds
      );

      fitBoundsSafely(
        bounds,
        12
      );

      const popupLayer =
        layers[
          layers.length - 1
        ];

      if (
        popupLayer &&
        typeof popupLayer.openPopup ===
          "function"
      ) {
        popupLayer.openPopup();
      }
    }


    function highlightCard(
      notamNo
    ) {
      state.selectedNotamNo =
        notamNo;

      notamListElement
        .querySelectorAll(
          ".notam-card"
        )
        .forEach(
          function (card) {
            const selected =
              card.dataset.notamNo ===
              notamNo;

            card.classList.toggle(
              "active",
              selected
            );

            if (selected) {
              card.scrollIntoView({
                behavior:
                  "smooth",

                block:
                  "nearest"
              });
            }
          }
        );
    }


    /********************************************************
     * 지도 보조
     ********************************************************/

    function clearNotamMapLayers() {
      notamLayerGroup.clearLayers();
      state.notamMapLayers.clear();
    }


    function collectLayerBounds(
      layers,
      target
    ) {
      layers.forEach(
        function (layer) {
          if (
            layer &&
            typeof layer.getBounds ===
              "function"
          ) {
            const bounds =
              layer.getBounds();

            if (
              bounds &&
              bounds.isValid()
            ) {
              target.push(
                bounds.getSouthWest()
              );

              target.push(
                bounds.getNorthEast()
              );
            }

          } else if (
            layer &&
            typeof layer.getLatLng ===
              "function"
          ) {
            target.push(
              layer.getLatLng()
            );
          }
        }
      );
    }


    function fitBoundsSafely(
      bounds,
      maxZoom
    ) {
      if (
        !Array.isArray(
          bounds
        ) ||
        bounds.length === 0
      ) {
        return;
      }

      const leafletBounds =
        L.latLngBounds(
          bounds
        );

      if (
        !leafletBounds.isValid()
      ) {
        return;
      }

      map.fitBounds(
        leafletBounds,
        {
          padding:
            [
              35,
              35
            ],

          maxZoom:
            maxZoom
        }
      );
    }


    function nmToMeters(
      nauticalMiles
    ) {
      return (
        Number(
          nauticalMiles
        ) *
        1852
      );
    }


    /********************************************************
     * 표시 함수
     ********************************************************/

    function getGeometryLabel(
      notam
    ) {
      if (
        notam.geometryType ===
        "POLYGON"
      ) {
        return (
          "다각형 · " +
          (
            Array.isArray(
              notam.polygon
            )
              ? notam.polygon.length
              : 0
          ) +
          "개 좌표"
        );
      }

      if (
        isFiniteNumber(
          notam.coreRadiusNm
        )
      ) {
        let text =
          "반경 " +
          Number(
            notam.coreRadiusNm
          ) +
          " NM";

        if (
          isFiniteNumber(
            notam.bufferRadiusNm
          )
        ) {
          text +=
            " / 버퍼 " +
            Number(
              notam.bufferRadiusNm
            ) +
            " NM";
        }

        return text;
      }

      return "구역 정보 확인 필요";
    }


    function getNotamDurationHours(
      notam
    ) {
      const start =
        new Date(
          notam.startUtc
        ).getTime();

      const end =
        new Date(
          notam.endUtc
        ).getTime();

      if (
        !Number.isFinite(
          start
        ) ||
        !Number.isFinite(
          end
        ) ||
        end < start
      ) {
        return 0;
      }

      return (
        end - start
      ) /
      (
        60 *
        60 *
        1000
      );
    }


    function formatDurationHours(
      hours
    ) {
      if (
        !Number.isFinite(
          Number(
            hours
          )
        )
      ) {
        return "-";
      }

      const totalMinutes =
        Math.round(
          Number(
            hours
          ) *
          60
        );

      const days =
        Math.floor(
          totalMinutes /
          (
            24 *
            60
          )
        );

      const remainingMinutes =
        totalMinutes -
        days *
        24 *
        60;

      const remainingHours =
        Math.floor(
          remainingMinutes /
          60
        );

      const minutes =
        remainingMinutes %
        60;

      if (
        days > 0
      ) {
        return (
          days +
          "일 " +
          remainingHours +
          "시간 " +
          minutes +
          "분"
        );
      }

      return (
        remainingHours +
        "시간 " +
        minutes +
        "분"
      );
    }


    function showLoading(
      title,
      description
    ) {
      loadingTitle.textContent =
        title;

      loadingDescription.textContent =
        description;

      loadingOverlay.classList.add(
        "visible"
      );

      refreshButton.disabled =
        true;
    }


    function hideLoading() {
      loadingOverlay.classList.remove(
        "visible"
      );

      refreshButton.disabled =
        false;
    }


    function setText(
      id,
      value
    ) {
      const element =
        document.getElementById(
          id
        );

      if (element) {
        element.textContent =
          value;
      }
    }


    function isFiniteNumber(
      value
    ) {
      return Number.isFinite(
        Number(
          value
        )
      );
    }


    function getErrorMessage(
      error
    ) {
      return (
        error &&
        error.message
          ? error.message
          : String(
              error
            )
      );
    }


    function escapeHtml(
      value
    ) {
      return String(
        value == null
          ? ""
          : value
      )
        .replace(
          /&/g,
          "&amp;"
        )
        .replace(
          /</g,
          "&lt;"
        )
        .replace(
          />/g,
          "&gt;"
        )
        .replace(
          /"/g,
          "&quot;"
        )
        .replace(
          /'/g,
          "&#039;"
        );
    }


    function escapeAttribute(
      value
    ) {
      return escapeHtml(
        value
      );
    }
  </script>
</body>
</html>
